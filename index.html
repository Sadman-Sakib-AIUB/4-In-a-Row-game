<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>4 IN A ROW</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg-dark: #0a0a1a;
      --bg-secondary: #12122a;
      --board-bg: #1a1a2e;
      --neon-red: #ff2d55;
      --neon-blue: #00d4ff;
      --neon-cyan: #00d4ff;
      --text: #ffffff;
      --text-dim: #8888aa;
      --glass-bg: rgba(26, 26, 46, 0.85);
    }

    body {
      font-family: 'Orbitron', sans-serif;
      background: var(--bg-dark);
      background-image: radial-gradient(ellipse at 50% 0%, #1a1a3a 0%, transparent 60%), radial-gradient(ellipse at 80% 100%, #0a0a2a 0%, transparent 50%), radial-gradient(ellipse at 20% 100%, #0a0a2a 0%, transparent 50%);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow-x: hidden;
      padding: 20px;
    }

    ::selection {
      background: var(--neon-cyan);
      color: var(--bg-dark);
    }

    .container {
      width: 100%;
      max-width: 600px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
    }

    .title {
      font-size: clamp(1.5rem, 5vw, 2.5rem);
      font-weight: 900;
      letter-spacing: 4px;
      text-align: center;
      color: var(--text);
      text-shadow: 0 0 10px var(--neon-cyan), 0 0 30px rgba(0, 212, 255, 0.3);
      margin-bottom: 5px;
    }

    .subtitle {
      font-size: 0.6rem;
      letter-spacing: 6px;
      color: var(--text-dim);
      text-transform: uppercase;
      text-align: center;
      margin-bottom: 10px;
    }

    .card {
      background: var(--glass-bg);
      border: 1px solid rgba(0, 212, 255, 0.15);
      border-radius: 16px;
      padding: 30px;
      width: 100%;
      backdrop-filter: blur(10px);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4), 0 0 60px rgba(0, 212, 255, 0.03);
    }

    .screen {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      width: 100%;
    }

    .screen.active {
      display: flex;
    }

    .btn {
      font-family: 'Orbitron', sans-serif;
      font-weight: 700;
      font-size: 0.9rem;
      letter-spacing: 2px;
      padding: 16px 40px;
      border: 2px solid var(--neon-cyan);
      background: transparent;
      color: var(--neon-cyan);
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.2s ease;
      text-transform: uppercase;
      width: 100%;
      position: relative;
      overflow: hidden;
    }

    .btn::before {
      content: '';
      position: absolute;
      inset: 0;
      background: var(--neon-cyan);
      opacity: 0;
      transition: opacity 0.2s ease;
    }

    .btn:hover {
      color: var(--bg-dark);
      box-shadow: 0 0 20px rgba(0, 212, 255, 0.4), 0 0 40px rgba(0, 212, 255, 0.2);
      transform: translateY(-2px);
    }

    .btn:hover::before {
      opacity: 1;
    }

    .btn span {
      position: relative;
      z-index: 1;
    }

    .btn-primary {
      border-color: var(--neon-red);
      color: var(--neon-red);
    }

    .btn-primary::before {
      background: var(--neon-red);
    }

    .btn-primary:hover {
      box-shadow: 0 0 20px rgba(255, 45, 85, 0.4), 0 0 40px rgba(255, 45, 85, 0.2);
    }

    .btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
      transform: none;
    }

    .btn:disabled:hover {
      color: var(--neon-cyan);
      box-shadow: none;
    }

    .btn:disabled:hover::before {
      opacity: 0;
    }

    .btn-small {
      padding: 10px 20px;
      font-size: 0.7rem;
      width: auto;
    }

    .input-group {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .input-label {
      font-size: 0.65rem;
      letter-spacing: 3px;
      color: var(--text-dim);
      text-transform: uppercase;
    }

    .input-field {
      font-family: 'Orbitron', sans-serif;
      font-weight: 600;
      font-size: 1rem;
      padding: 14px 18px;
      border: 2px solid rgba(0, 212, 255, 0.2);
      background: rgba(0, 0, 0, 0.3);
      color: var(--text);
      border-radius: 8px;
      outline: none;
      transition: all 0.2s ease;
      letter-spacing: 2px;
      text-align: center;
      text-transform: uppercase;
    }

    .input-field:focus {
      border-color: var(--neon-cyan);
      box-shadow: 0 0 15px rgba(0, 212, 255, 0.2);
    }

    .input-field::placeholder {
      color: var(--text-dim);
      letter-spacing: 1px;
      text-transform: none;
    }

    .room-id-display {
      font-size: 1.8rem;
      font-weight: 800;
      letter-spacing: 6px;
      color: var(--neon-cyan);
      text-shadow: 0 0 15px rgba(0, 212, 255, 0.5);
      text-align: center;
      padding: 16px;
      border: 1px solid rgba(0, 212, 255, 0.2);
      border-radius: 8px;
      background: rgba(0, 212, 255, 0.05);
      word-break: break-all;
      width: 100%;
    }

    .status-text {
      font-size: 0.7rem;
      letter-spacing: 2px;
      color: var(--text-dim);
      text-align: center;
      text-transform: uppercase;
    }

    .status-text.waiting {
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.5; }
      50% { opacity: 1; }
    }

    .board-container {
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 15px;
    }

    .board {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 6px;
      padding: 15px;
      background: var(--glass-bg);
      border: 1px solid rgba(0, 212, 255, 0.15);
      border-radius: 16px;
      box-shadow: 0 0 40px rgba(0, 212, 255, 0.05), 0 8px 32px rgba(0, 0, 0, 0.3);
      width: 100%;
      max-width: 420px;
      aspect-ratio: 7 / 6;
    }

    .cell {
      aspect-ratio: 1;
      border-radius: 50%;
      background: rgba(0, 0, 0, 0.4);
      border: 2px solid rgba(255, 255, 255, 0.05);
      cursor: pointer;
      transition: all 0.15s ease;
      position: relative;
      overflow: hidden;
    }

    .cell:hover {
      border-color: rgba(0, 212, 255, 0.4);
      box-shadow: inset 0 0 15px rgba(0, 212, 255, 0.15);
    }

    .cell.player1 {
      background: radial-gradient(circle at 35% 35%, #ff6b8a, var(--neon-red) 60%, #cc0033);
      border-color: var(--neon-red);
      box-shadow: 0 0 10px rgba(255, 45, 85, 0.5), 0 0 20px rgba(255, 45, 85, 0.2);
    }

    .cell.player2 {
      background: radial-gradient(circle at 35% 35%, #66e5ff, var(--neon-blue) 60%, #0099cc);
      border-color: var(--neon-blue);
      box-shadow: 0 0 10px rgba(0, 212, 255, 0.5), 0 0 20px rgba(0, 212, 255, 0.2);
    }

    .cell.win-cell.player1 {
      border-color: #ff0040;
      box-shadow: 0 0 20px rgba(255, 45, 85, 0.9), 0 0 40px rgba(255, 45, 85, 0.5), 0 0 60px rgba(255, 45, 85, 0.3);
    }

    .cell.win-cell.player2 {
      border-color: #00ffff;
      box-shadow: 0 0 20px rgba(0, 212, 255, 0.9), 0 0 40px rgba(0, 212, 255, 0.5), 0 0 60px rgba(0, 212, 255, 0.3);
    }

    .cell.dropping {
      animation: dropBounce 0.5s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards;
    }

    @keyframes dropBounce {
      0% { transform: translateY(-500%); opacity: 0.5; }
      60% { transform: translateY(5%); }
      80% { transform: translateY(-3%); }
      100% { transform: translateY(0); opacity: 1; }
    }

    .cell.win-cell {
      animation: winPulse 1.5s ease-in-out infinite;
      transform-origin: center center;
    }

    @keyframes winPulse {
      0%, 100% { transform: scale(1); filter: brightness(1) drop-shadow(0 0 0px transparent); }
      50% { transform: scale(1.18); filter: brightness(1.6) drop-shadow(0 0 12px rgba(255,255,255,0.8)); }
    }

    .turn-indicator {
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 0.7rem;
      letter-spacing: 3px;
      text-transform: uppercase;
    }

    .turn-dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: var(--neon-cyan);
      box-shadow: 0 0 10px currentColor;
      animation: breathe 1.5s ease-in-out infinite;
    }

    .turn-dot.red { background: var(--neon-red); }
    .turn-dot.blue { background: var(--neon-blue); }

    @keyframes breathe {
      0%, 100% { opacity: 0.5; box-shadow: 0 0 5px currentColor; }
      50% { opacity: 1; box-shadow: 0 0 15px currentColor; }
    }

    .players-bar {
      display: flex;
      justify-content: space-between;
      width: 100%;
      max-width: 420px;
      gap: 20px;
    }

    .player-info {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.65rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      padding: 8px 14px;
      border-radius: 20px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      background: rgba(0, 0, 0, 0.2);
      flex: 1;
      justify-content: center;
    }

    .player-info.you {
      border-color: rgba(0, 212, 255, 0.4);
      background: rgba(0, 212, 255, 0.05);
    }

    .player-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
    }

    .player-dot.red { background: var(--neon-red); box-shadow: 0 0 8px var(--neon-red); }
    .player-dot.blue { background: var(--neon-blue); box-shadow: 0 0 8px var(--neon-blue); }

    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(10, 10, 26, 0.92);
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
      z-index: 100;
      padding: 20px;
      backdrop-filter: blur(5px);
    }

    .overlay.active {
      display: flex;
    }

    .overlay-icon {
      font-size: 3rem;
    }

    .overlay-title {
      font-size: clamp(1.5rem, 6vw, 2.5rem);
      font-weight: 900;
      letter-spacing: 4px;
      text-align: center;
    }

    .overlay-title.win {
      color: var(--neon-cyan);
      text-shadow: 0 0 20px var(--neon-cyan), 0 0 60px rgba(0, 212, 255, 0.3);
    }

    .overlay-title.lose {
      color: var(--neon-red);
      text-shadow: 0 0 20px var(--neon-red), 0 0 60px rgba(255, 45, 85, 0.3);
    }

    .overlay-title.draw {
      color: #ffaa00;
      text-shadow: 0 0 20px #ffaa00, 0 0 60px rgba(255, 170, 0, 0.3);
    }

    .overlay-sub {
      font-size: 0.65rem;
      letter-spacing: 3px;
      color: var(--text-dim);
      text-transform: uppercase;
    }

    .btn-group {
      display: flex;
      gap: 12px;
      width: 100%;
      max-width: 300px;
    }

    .btn-group .btn {
      flex: 1;
    }

    .copy-btn {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.6rem;
    }

    .copy-feedback {
      font-size: 0.6rem;
      color: var(--neon-cyan);
      letter-spacing: 1px;
      min-height: 14px;
    }

    .back-btn {
      font-size: 0.6rem;
      padding: 8px 16px;
      letter-spacing: 2px;
      color: var(--text-dim);
      border-color: rgba(255, 255, 255, 0.1);
    }

    .back-btn:hover {
      color: var(--text);
      border-color: rgba(255, 255, 255, 0.3);
      box-shadow: none;
      transform: none;
    }

    .back-btn::before {
      display: none;
    }

    .chat-toggle-btn {
      position: fixed;
      bottom: 20px;
      right: 20px;
      width: 52px;
      height: 52px;
      border-radius: 50%;
      background: var(--glass-bg);
      border: 2px solid var(--neon-cyan);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 1.4rem;
      transition: all 0.2s ease;
      box-shadow: 0 0 15px rgba(0, 212, 255, 0.2);
      z-index: 50;
    }

    .chat-toggle-btn:hover {
      box-shadow: 0 0 25px rgba(0, 212, 255, 0.5);
      transform: scale(1.08);
    }

    .chat-toggle-btn.chat-active {
      background: rgba(0, 212, 255, 0.15);
      box-shadow: 0 0 25px rgba(0, 212, 255, 0.4);
    }

    .chat-badge {
      position: absolute;
      top: -4px;
      right: -4px;
      background: var(--neon-red);
      color: #fff;
      font-size: 0.55rem;
      font-weight: 800;
      min-width: 18px;
      height: 18px;
      border-radius: 9px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0 3px;
    }

    .chat-panel {
      position: fixed;
      bottom: 80px;
      right: 20px;
      width: 300px;
      background: var(--glass-bg);
      border: 1px solid rgba(0, 212, 255, 0.2);
      border-radius: 16px;
      display: flex;
      flex-direction: column;
      z-index: 200;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5), 0 0 40px rgba(0, 212, 255, 0.05);
      overflow: hidden;
    }

    .chat-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
      border-bottom: 1px solid rgba(0, 212, 255, 0.1);
      font-size: 0.65rem;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--neon-cyan);
    }

    .chat-close-btn {
      background: none;
      border: none;
      color: var(--text-dim);
      font-size: 0.9rem;
      cursor: pointer;
      padding: 2px 6px;
      border-radius: 4px;
      transition: color 0.2s;
    }

    .chat-close-btn:hover {
      color: var(--text);
    }

    .chat-messages {
      height: 180px;
      overflow-y: auto;
      padding: 10px 12px;
      display: flex;
      flex-direction: column;
      gap: 6px;
      scrollbar-width: thin;
      scrollbar-color: rgba(0, 212, 255, 0.2) transparent;
    }

    .chat-messages::-webkit-scrollbar {
      width: 4px;
    }

    .chat-messages::-webkit-scrollbar-track {
      background: transparent;
    }

    .chat-messages::-webkit-scrollbar-thumb {
      background: rgba(0, 212, 255, 0.2);
      border-radius: 2px;
    }

    .chat-msg {
      max-width: 85%;
      padding: 6px 10px;
      border-radius: 12px;
      font-size: 0.65rem;
      letter-spacing: 0.5px;
      line-height: 1.4;
      animation: msgFadeIn 0.3s ease;
    }

    @keyframes msgFadeIn {
      from { opacity: 0; transform: translateY(5px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .chat-msg.mine {
      align-self: flex-end;
      background: rgba(255, 45, 85, 0.15);
      border: 1px solid rgba(255, 45, 85, 0.3);
      color: var(--neon-red);
      border-bottom-right-radius: 4px;
    }

    .chat-msg.theirs {
      align-self: flex-start;
      background: rgba(0, 212, 255, 0.1);
      border: 1px solid rgba(0, 212, 255, 0.2);
      color: var(--neon-blue);
      border-bottom-left-radius: 4px;
    }

    .chat-msg .chat-sender {
      font-size: 0.55rem;
      opacity: 0.7;
      margin-bottom: 2px;
      letter-spacing: 1px;
    }

    .chat-quick {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      padding: 10px 12px;
      border-top: 1px solid rgba(0, 212, 255, 0.08);
    }

    .chat-quick-btn {
      font-size: 0.9rem;
      padding: 5px 8px;
      border: 1px solid rgba(0, 212, 255, 0.2);
      background: rgba(0, 0, 0, 0.2);
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.15s ease;
    }

    .chat-quick-btn:hover {
      background: rgba(0, 212, 255, 0.15);
      border-color: var(--neon-cyan);
      transform: scale(1.1);
    }

    .chat-input-row {
      display: flex;
      gap: 8px;
      padding: 10px 12px;
      border-top: 1px solid rgba(0, 212, 255, 0.08);
    }

    .chat-input {
      flex: 1;
      font-family: 'Orbitron', sans-serif;
      font-size: 0.6rem;
      padding: 8px 10px;
      border: 1px solid rgba(0, 212, 255, 0.2);
      background: rgba(0, 0, 0, 0.3);
      color: var(--text);
      border-radius: 8px;
      outline: none;
      transition: border-color 0.2s;
    }

    .chat-input::placeholder {
      color: var(--text-dim);
      font-size: 0.55rem;
    }

    .chat-input:focus {
      border-color: var(--neon-cyan);
    }

    .chat-send-btn {
      font-family: 'Orbitron', sans-serif;
      font-size: 0.55rem;
      font-weight: 700;
      letter-spacing: 1px;
      padding: 8px 12px;
      border: 1px solid var(--neon-cyan);
      background: transparent;
      color: var(--neon-cyan);
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.15s ease;
      white-space: nowrap;
    }

    .chat-send-btn:hover {
      background: var(--neon-cyan);
      color: var(--bg-dark);
    }

    @media (max-width: 480px) {
      body { padding: 10px; }
      .card { padding: 20px; }
      .board { gap: 4px; padding: 10px; }
      .btn { padding: 14px 20px; font-size: 0.8rem; }
      .players-bar { gap: 10px; }
      .player-info { padding: 6px 10px; font-size: 0.55rem; }
      .chat-panel {
        right: 10px;
        left: 10px;
        width: auto;
        bottom: 70px;
      }
      .chat-toggle-btn {
        bottom: 16px;
        right: 16px;
        width: 46px;
        height: 46px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="title">4 IN A ROW</div>
    <div class="subtitle">Connect Four — Peer to Peer</div>

    <!-- Landing Screen -->
    <div id="landing-screen" class="screen active">
      <div class="card" style="text-align:center; display:flex; flex-direction:column; gap:15px; width:100%;">
        <div class="subtitle" style="margin-bottom:5px;">Choose how to play</div>
        <button class="btn" onclick="startAI()"><span>Play vs AI</span></button>
        <button class="btn btn-primary" onclick="createRoom()"><span>Create Room</span></button>
        <button class="btn" onclick="showJoinScreen()"><span>Join Room</span></button>
      </div>
    </div>

    <!-- Join Screen -->
    <div id="join-screen" class="screen">
      <div class="card" style="display:flex; flex-direction:column; gap:20px; width:100%;">
        <div style="text-align:center;">
          <div class="subtitle" style="margin-bottom:5px;">Enter room ID to join</div>
        </div>
        <div class="input-group">
          <label class="input-label">Room ID</label>
          <input type="text" id="join-input" class="input-field" placeholder="Enter ID" maxlength="20" autocomplete="off" spellcheck="false">
        </div>
        <button class="btn btn-primary" onclick="joinRoom()"><span>Connect</span></button>
        <button class="btn back-btn" onclick="showLandingScreen()"><span>← Back</span></button>
      </div>
    </div>

    <!-- Waiting Screen -->
    <div id="waiting-screen" class="screen">
      <div class="card" style="display:flex; flex-direction:column; gap:20px; width:100%; align-items:center;">
        <div class="subtitle">Your Room ID — share with opponent</div>
        <div id="room-id-display" class="room-id-display">------</div>
        <button class="btn btn-small copy-btn" onclick="copyRoomId()">
          <span id="copy-text">Copy ID</span>
        </button>
        <div id="waiting-status" class="status-text waiting">Waiting for opponent to join...</div>
        <button class="btn back-btn" onclick="leaveRoom()"><span>← Leave Room</span></button>
      </div>
    </div>

    <!-- Game Screen -->
    <div id="game-screen" class="screen">
      <div class="players-bar">
        <div class="player-info you" id="player1-info">
          <div class="player-dot red"></div>
          <span>Player 1</span>
        </div>
        <div class="player-info" id="player2-info">
          <div class="player-dot blue"></div>
          <span>Player 2</span>
        </div>
      </div>
      <div class="board-container">
        <div class="board" id="board"></div>
        <div class="turn-indicator" id="turn-indicator">
          <div class="turn-dot" id="turn-dot"></div>
          <span id="turn-text">Connecting...</span>
        </div>
      </div>

      <div id="chat-toggle-btn" class="chat-toggle-btn" onclick="toggleChat()" style="display:none;">
        <span>💬</span>
        <div id="chat-badge" class="chat-badge" style="display:none;">0</div>
      </div>

      <div id="chat-panel" class="chat-panel" style="display:none;">
        <div class="chat-header">
          <span>Quick Chat</span>
          <button class="chat-close-btn" onclick="toggleChat()">✕</button>
        </div>
        <div id="chat-messages" class="chat-messages"></div>
        <div class="chat-quick">
          <button class="chat-quick-btn" onclick="sendQuickChat('GG!')">🎮</button>
          <button class="chat-quick-btn" onclick="sendQuickChat('Nice move!')">👏</button>
          <button class="chat-quick-btn" onclick="sendQuickChat('That was close!')">😅</button>
          <button class="chat-quick-btn" onclick="sendQuickChat('You\'re on fire!')">🔥</button>
          <button class="chat-quick-btn" onclick="sendQuickChat('Smart play!')">🧠</button>
          <button class="chat-quick-btn" onclick="sendQuickChat('Well played!')">🙌</button>
          <button class="chat-quick-btn" onclick="sendQuickChat('Oops!')">😤</button>
          <button class="chat-quick-btn" onclick="sendQuickChat('Hmm...?')">⏳</button>
        </div>
        <div class="chat-input-row">
          <input type="text" id="chat-input" class="chat-input" placeholder="Type a message..." maxlength="100" onkeydown="if(event.key==='Enter')sendChatText()">
          <button class="chat-send-btn" onclick="sendChatText()">Send</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Game Over Overlay -->
  <div id="gameover-overlay" class="overlay">
    <div class="overlay-icon" id="overlay-icon"></div>
    <div class="overlay-title" id="overlay-title">YOU WIN</div>
    <div class="overlay-sub" id="overlay-sub">Opponent connected four!</div>
    <div class="btn-group">
      <button class="btn btn-primary" onclick="playAgain()"><span>Play Again</span></button>
      <button class="btn back-btn" onclick="leaveGame()"><span>Leave</span></button>
    </div>
  </div>

  <!-- Disconnect Overlay -->
  <div id="disconnect-overlay" class="overlay">
    <div class="overlay-icon">⚡</div>
    <div class="overlay-title" style="color:var(--text-dim);">Disconnected</div>
    <div class="overlay-sub" id="disconnect-reason">Opponent has left the game</div>
    <button class="btn" onclick="resetAll()"><span>New Game</span></button>
  </div>

  <script>
    const ROWS = 6, COLS = 7;
    let peer = null;
    let connection = null;
    let isHost = false;
    let myPlayer = 1;
    let currentTurn = 1;
    let board = [];
    let gameActive = false;
    let restartRequested = false;
    let opponentRestartRequested = false;
    let globalRoomId = '';
    let connectRetryTimer = null;
    let connectRetryCount = 0;
    let hostPeerReady = false;
    let hostConnReady = false;
    let joinerConnReady = false;
    const MAX_CONNECT_RETRIES = 3;
    const CONNECT_RETRY_DELAY = 3000;
    let isAI = false;
    let aiThinkingTimer = null;
    const AI_DEPTH = 5;
    const AI_DELAY_MS = 800;
    let chatOpen = false;
    let chatUnread = 0;
    const MAX_CHAT_MESSAGES = 50;

    const SCREENS = ['landing-screen', 'join-screen', 'waiting-screen', 'game-screen'];
    const OVERLAYS = ['gameover-overlay', 'disconnect-overlay'];

    function showScreen(id) {
      SCREENS.forEach(s => document.getElementById(s).classList.remove('active'));
      document.getElementById(id).classList.add('active');
    }

    function showOverlay(id) {
      OVERLAYS.forEach(o => document.getElementById(o).classList.remove('active'));
      if (id) document.getElementById(id).classList.add('active');
    }

    function showLandingScreen() { showScreen('landing-screen'); }
    function showJoinScreen() { showScreen('join-screen'); document.getElementById('join-input').value = ''; }
    function showWaitingScreen() { showScreen('waiting-screen'); }
    function showAIScreen() { showScreen('game-screen'); }

    function generateRoomId() {
      const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
      let id = '';
      for (let i = 0; i < 8; i++) id += chars[Math.floor(Math.random() * chars.length)];
      return id;
    }

    function createRoom() {
      const roomId = generateRoomId();
      globalRoomId = roomId;
      isHost = true;
      myPlayer = 1;
      hostPeerReady = false;
      hostConnReady = false;
      console.log('[HOST] Creating room:', roomId);
      peer = new Peer('4IR' + roomId, { debug: 2, config: { iceServers: [{ urls: 'stun:stun.l.google.com:19302' }, { urls: 'stun:stun1.l.google.com:19302' }] } });
      setupHostPeer();
    }

    function joinRoom() {
      const id = document.getElementById('join-input').value.trim().toUpperCase();
      if (!id) return;
      globalRoomId = id;
      isHost = false;
      myPlayer = 2;
      joinerConnReady = false;
      console.log('[JOINER] Joining room:', id);
      peer = new Peer({ debug: 2, config: { iceServers: [{ urls: 'stun:stun.l.google.com:19302' }, { urls: 'stun:stun1.l.google.com:19302' }] } });
      setupJoinerPeer();
    }

    function setupHostPeer() {
      peer.on('open', () => {
        console.log('[HOST] Peer open, ID:', peer.id);
        hostPeerReady = true;
        document.getElementById('room-id-display').textContent = globalRoomId;
        showScreen('waiting-screen');
        if (hostConnReady) triggerStartGame();
      });

      peer.on('connection', (conn) => {
        console.log('[HOST] Incoming connection from:', conn.peer);
        if (connection && connection.open) {
          console.log('[HOST] Connection already open, ignoring duplicate');
          conn.close();
          return;
        }
        connection = conn;
        setupConnection();
      });

      peer.on('error', (err) => {
        console.error('[HOST] Peer error:', err.type, err);
        if (err.type === 'unavailable-id') {
          alert('This room ID is already taken. Try creating a new room.');
        } else if (err.type === 'peer-unavailable') {
          console.log('[HOST] Peer unavailable - may happen during retry');
        } else {
          alert('Connection error: ' + err.type);
        }
        showLandingScreen();
        if (peer) peer.destroy();
      });
    }

    function setupJoinerPeer() {
      peer.on('open', () => {
        console.log('[JOINER] Peer open, ID:', peer.id);
        showScreen('waiting-screen');
        document.getElementById('waiting-status').textContent = 'Connecting to host...';
        document.getElementById('room-id-display').textContent = globalRoomId;
        attemptConnect();
      });

      peer.on('error', (err) => {
        console.error('[JOINER] Peer error:', err.type, err);
        if (err.type === 'peer-unavailable') {
          if (connectRetryCount < MAX_CONNECT_RETRIES) {
            connectRetryCount++;
            console.log('[JOINER] Retry ' + connectRetryCount + '/' + MAX_CONNECT_RETRIES + ' in ' + CONNECT_RETRY_DELAY + 'ms');
            document.getElementById('waiting-status').textContent = 'Retrying... (' + connectRetryCount + ')';
            connectRetryTimer = setTimeout(attemptConnect, CONNECT_RETRY_DELAY);
          } else {
            alert('Room not found after ' + MAX_CONNECT_RETRIES + ' attempts. Check the ID and try again.');
            showLandingScreen();
            if (peer) peer.destroy();
          }
        } else {
          alert('Connection error: ' + err.type);
          showLandingScreen();
          if (peer) peer.destroy();
        }
      });
    }

    function attemptConnect() {
      console.log('[JOINER] Attempting to connect to:', '4IR' + globalRoomId);
      if (connectRetryTimer) clearTimeout(connectRetryTimer);
      const conn = peer.connect('4IR' + globalRoomId, { reliable: true });
      connection = conn;
      setupConnection();
    }

    function send(data) {
      if (connection && connection.open) {
        connection.send(data);
      }
    }

    function toggleChat() {
      const panel = document.getElementById('chat-panel');
      const btn = document.getElementById('chat-toggle-btn');
      chatOpen = !chatOpen;
      if (chatOpen) {
        panel.style.display = 'flex';
        btn.classList.add('chat-active');
        chatUnread = 0;
        updateChatBadge();
        const input = document.getElementById('chat-input');
        setTimeout(() => input.focus(), 100);
        const msgs = document.getElementById('chat-messages');
        msgs.scrollTop = msgs.scrollHeight;
      } else {
        panel.style.display = 'none';
        btn.classList.remove('chat-active');
      }
    }

    function sendQuickChat(text) {
      if (isAI || !connection || !connection.open) return;
      addChatMessage(text, true);
      send({ type: 'chat', text });
    }

    function sendChatText() {
      if (isAI || !connection || !connection.open) return;
      const input = document.getElementById('chat-input');
      const text = input.value.trim();
      if (!text) return;
      addChatMessage(text, true);
      send({ type: 'chat', text });
      input.value = '';
    }

    function addChatMessage(text, isMine) {
      const msgs = document.getElementById('chat-messages');
      const msg = document.createElement('div');
      msg.className = 'chat-msg ' + (isMine ? 'mine' : 'theirs');
      msg.innerHTML = '<div class="chat-sender">' + (isMine ? 'You' : 'Opponent') + '</div><div>' + escapeHtml(text) + '</div>';
      msgs.appendChild(msg);
      while (msgs.children.length > MAX_CHAT_MESSAGES) {
        msgs.removeChild(msgs.firstChild);
      }
      msgs.scrollTop = msgs.scrollHeight;
      if (!isMine && !chatOpen) {
        chatUnread++;
        updateChatBadge();
      }
    }

    function updateChatBadge() {
      const badge = document.getElementById('chat-badge');
      const btn = document.getElementById('chat-toggle-btn');
      if (chatUnread > 0) {
        badge.textContent = chatUnread > 9 ? '9+' : chatUnread;
        badge.style.display = 'flex';
      } else {
        badge.style.display = 'none';
      }
    }

    function showChatButton() {
      if (!isAI) {
        document.getElementById('chat-toggle-btn').style.display = 'flex';
      }
    }

    function hideChatPanel() {
      chatOpen = false;
      document.getElementById('chat-panel').style.display = 'none';
      document.getElementById('chat-toggle-btn').classList.remove('chat-active');
      chatUnread = 0;
      updateChatBadge();
    }

    function clearChat() {
      document.getElementById('chat-messages').innerHTML = '';
      chatUnread = 0;
      updateChatBadge();
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    function setupConnection() {
      console.log('[CONN] Setting up connection, type:', isHost ? 'host' : 'joiner', 'conn:', connection ? 'exists' : 'null');

      connection.on('open', () => {
        console.log('[CONN] Connection open!');
        if (isHost) {
          hostConnReady = true;
          console.log('[CONN] hostConnReady = true');
          if (hostPeerReady) {
            console.log('[CONN] Calling triggerStartGame from host open');
            triggerStartGame();
          } else {
            console.log('[CONN] hostPeerReady is false, waiting');
          }
        } else {
          joinerConnReady = true;
          console.log('[JOINER] Connection open, sending ready signal');
          send({ type: 'ready' });
        }
      });

      connection.on('data', (data) => {
        console.log('[CONN] Received data:', JSON.stringify(data));
        if (data.type === 'ready') {
          if (isHost) {
            hostConnReady = true;
            console.log('[HOST] Got ready, hostConnReady=true, hostPeerReady=', hostPeerReady);
            if (hostPeerReady) {
              console.log('[HOST] Calling triggerStartGame from ready handler');
              triggerStartGame();
            }
          } else {
            joinerConnReady = true;
            triggerStartGame();
          }
        } else {
          handleMessage(data);
        }
      });

      connection.on('close', () => {
        console.log('[CONN] Connection closed');
        if (gameActive) {
          showOverlay('disconnect-overlay');
        }
      });

      connection.on('error', (err) => {
        console.error('[CONN] Connection error:', err.type || err.message || err);
      });
    }

    function triggerStartGame() {
      console.log('[GAME] triggerStartGame called, isHost:', isHost, 'hostConnReady:', hostConnReady, 'joinerConnReady:', joinerConnReady);
      if (isHost && (!hostConnReady || !hostPeerReady)) {
        console.log('[GAME] Host not ready yet, skipping');
        return;
      }
      document.getElementById('waiting-status').textContent = 'Connected! Starting game...';
      setTimeout(() => {
        console.log('[GAME] Starting game now');
        initBoard();
        showScreen('game-screen');
        updatePlayerLabels();
        updateTurn();
        gameActive = true;
        restartRequested = false;
        opponentRestartRequested = false;
        clearChat();
        showChatButton();
        if (isHost) {
          console.log('[GAME] Host sending start message');
          send({ type: 'start' });
        }
      }, 500);
    }

    function initBoard() {
      board = Array(ROWS).fill(null).map(() => Array(COLS).fill(0));
      renderBoard();
    }

    function renderBoard() {
      const boardEl = document.getElementById('board');
      boardEl.innerHTML = '';
      for (let r = 0; r < ROWS; r++) {
        for (let c = 0; c < COLS; c++) {
          const cell = document.createElement('div');
          cell.className = 'cell';
          cell.dataset.row = r;
          cell.dataset.col = c;
          if (board[r][c] === 1) cell.classList.add('player1');
          if (board[r][c] === 2) cell.classList.add('player2');
          cell.addEventListener('click', () => handleCellClick(c));
          boardEl.appendChild(cell);
        }
      }
    }

    function handleCellClick(col) {
      if (!gameActive) return;
      if (currentTurn !== myPlayer) return;

      const row = getLowestRow(col);
      if (row === -1) return;

      board[row][col] = myPlayer;
      animateDrop(row, col);

      if (!isAI) send({ type: 'move', row, col });

      if (checkWin(row, col)) {
        setTimeout(() => endGame(myPlayer === 1 ? 'player1' : 'player2'), 600);
        return;
      }

      if (checkDraw()) {
        setTimeout(() => endGame('draw'), 600);
        return;
      }

      if (isAI) {
        currentTurn = 2;
        updateTurn();
        if (aiThinkingTimer) clearTimeout(aiThinkingTimer);
        aiThinkingTimer = setTimeout(makeAIMove, AI_DELAY_MS);
      } else {
        currentTurn = myPlayer === 1 ? 2 : 1;
        setTimeout(updateTurn, 400);
      }
    }

    function getLowestRow(col) {
      for (let r = ROWS - 1; r >= 0; r--) {
        if (board[r][col] === 0) return r;
      }
      return -1;
    }

    function animateDrop(row, col) {
      const cells = document.querySelectorAll('.cell');
      const idx = row * COLS + col;
      cells[idx].classList.add('dropping');
      setTimeout(() => cells[idx].classList.remove('dropping'), 600);
      renderBoard();
    }

    function checkWin(row, col) {
      const player = board[row][col];
      const directions = [[0, 1], [1, 0], [1, 1], [1, -1]];
      for (const [dr, dc] of directions) {
        let count = 1;
        for (let i = 1; i < 4; i++) {
          const r = row + dr * i, c = col + dc * i;
          if (r >= 0 && r < ROWS && c >= 0 && c < COLS && board[r][c] === player) count++;
          else break;
        }
        for (let i = 1; i < 4; i++) {
          const r = row - dr * i, c = col - dc * i;
          if (r >= 0 && r < ROWS && c >= 0 && c < COLS && board[r][c] === player) count++;
          else break;
        }
        if (count >= 4) return true;
      }
      return false;
    }

    function checkDraw() {
      return board[0].every(c => c !== 0);
    }

    function getWinningCells(row, col) {
      const player = board[row][col];
      const directions = [[0, 1], [1, 0], [1, 1], [1, -1]];
      for (const [dr, dc] of directions) {
        let cells = [[row, col]];
        for (let i = 1; i < 4; i++) {
          const r = row + dr * i, c = col + dc * i;
          if (r >= 0 && r < ROWS && c >= 0 && c < COLS && board[r][c] === player) cells.push([r, c]);
          else break;
        }
        for (let i = 1; i < 4; i++) {
          const r = row - dr * i, c = col - dc * i;
          if (r >= 0 && r < ROWS && c >= 0 && c < COLS && board[r][c] === player) cells.push([r, c]);
          else break;
        }
        if (cells.length >= 4) return cells;
      }
      return [];
    }

    function endGame(result) {
      gameActive = false;
      const overlay = document.getElementById('gameover-overlay');
      const title = document.getElementById('overlay-title');
      const sub = document.getElementById('overlay-sub');
      const icon = document.getElementById('overlay-icon');

      if (result === 'draw') {
        title.textContent = 'DRAW';
        title.className = 'overlay-title draw';
        sub.textContent = 'The board is full — no winner!';
        icon.textContent = '🤝';
      } else {
        const won = (result === 'player1' && myPlayer === 1) || (result === 'player2' && myPlayer === 2);
        title.textContent = won ? 'YOU WIN' : 'YOU LOSE';
        title.className = 'overlay-title ' + (won ? 'win' : 'lose');
        sub.textContent = won ? 'Congratulations — four in a row!' : (isAI ? 'AI wins this round!' : 'Opponent wins this round!');
        icon.textContent = won ? '🏆' : '💀';
        if (!isAI) send({ type: 'gameover', result });

        highlightWinningCells();
      }

      setTimeout(() => overlay.classList.add('active'), 2000);
    }

    function highlightWinningCells() {
      for (let r = 0; r < ROWS; r++) {
        for (let c = 0; c < COLS; c++) {
          if (board[r][c] !== 0) {
            const winCells = getWinningCells(r, c);
            if (winCells.length >= 4) {
              winCells.forEach(([wr, wc]) => {
                const idx = wr * COLS + wc;
                const cells = document.querySelectorAll('.cell');
                cells[idx].classList.add('win-cell');
              });
              return;
            }
          }
        }
      }
    }

    function updateTurn() {
      const dot = document.getElementById('turn-dot');
      const text = document.getElementById('turn-text');
      if (currentTurn === myPlayer) {
        text.textContent = 'Your Turn';
        dot.className = 'turn-dot ' + (myPlayer === 1 ? 'red' : 'blue');
      } else {
        text.textContent = 'Opponent\'s Turn';
        dot.className = 'turn-dot ' + (myPlayer === 1 ? 'blue' : 'red');
      }
    }

    function updatePlayerLabels() {
      const p1 = document.getElementById('player1-info');
      const p2 = document.getElementById('player2-info');
      if (isAI) {
        p1.querySelector('span').textContent = 'You (Player 1)';
        p2.querySelector('span').textContent = 'AI';
        p1.classList.add('you');
        p2.classList.remove('you');
      } else {
        p1.querySelector('span').textContent = myPlayer === 1 ? 'You (Player 1)' : 'Player 1';
        p2.querySelector('span').textContent = myPlayer === 2 ? 'You (Player 2)' : 'Player 2';
        if (myPlayer === 1) p1.classList.add('you');
        else p2.classList.add('you');
      }
    }

    function handleMessage(data) {
      if (data.type === 'move') {
        const { row, col } = data;
        const opponent = myPlayer === 1 ? 2 : 1;
        board[row][col] = opponent;
        animateDrop(row, col);

        if (checkWin(row, col)) {
          setTimeout(() => endGame(opponent === 1 ? 'player1' : 'player2'), 600);
          return;
        }
        if (checkDraw()) {
          setTimeout(() => endGame('draw'), 600);
          return;
        }
        currentTurn = myPlayer;
        setTimeout(updateTurn, 400);
      } else if (data.type === 'start') {
        initBoard();
        showScreen('game-screen');
        updatePlayerLabels();
        updateTurn();
        gameActive = true;
        restartRequested = false;
        opponentRestartRequested = false;
        clearChat();
        showChatButton();
      } else if (data.type === 'ready') {
        console.log('[HOST] Received ready from joiner');
        if (hostPeerReady) triggerStartGame();
        send({ type: 'start' });
      } else if (data.type === 'gameover') {
        if (!gameActive) {
          gameActive = false;
          const won = (data.result === 'player1' && myPlayer === 1) || (data.result === 'player2' && myPlayer === 2);
          const title = document.getElementById('overlay-title');
          const sub = document.getElementById('overlay-sub');
          const icon = document.getElementById('overlay-icon');
          title.textContent = won ? 'YOU WIN' : 'YOU LOSE';
          title.className = 'overlay-title ' + (won ? 'win' : 'lose');
          sub.textContent = won ? 'Congratulations — four in a row!' : 'Opponent wins this round!';
          icon.textContent = won ? '🏆' : '💀';
          highlightWinningCells();
          setTimeout(() => document.getElementById('gameover-overlay').classList.add('active'), 2000);
        }
      } else if (data.type === 'restart') {
        opponentRestartRequested = true;
        if (restartRequested) {
          performRestart();
        }
      } else if (data.type === 'leave') {
        showOverlay('disconnect-overlay');
        document.getElementById('disconnect-reason').textContent = 'Opponent has left the game';
        hideChatPanel();
      } else if (data.type === 'chat') {
        if (data.text) addChatMessage(data.text, false);
      }
    }

    function startAI() {
      isAI = true;
      myPlayer = 1;
      currentTurn = 1;
      initBoard();
      showScreen('game-screen');
      updatePlayerLabels();
      updateTurn();
      gameActive = true;
    }

    function makeAIMove() {
      if (!gameActive) return;
      const col = minimaxMove();
      if (col === -1) return;

      const row = getLowestRow(col);
      board[row][col] = 2;
      animateDrop(row, col);

      if (checkWin(row, col)) {
        setTimeout(() => endGame('player2'), 600);
        return;
      }
      if (checkDraw()) {
        setTimeout(() => endGame('draw'), 600);
        return;
      }
      currentTurn = 1;
      setTimeout(updateTurn, 400);
    }

    function minimaxMove() {
      const validCols = getValidCols();
      if (validCols.length === 0) return -1;

      let bestScore = -Infinity;
      let bestCol = validCols[Math.floor(validCols.length / 2)];

      for (const col of validCols) {
        const row = getLowestRowForBoard(col, board);
        const newBoard = board.map(r => [...r]);
        newBoard[row][col] = 2;
        const score = minimax(newBoard, AI_DEPTH - 1, -Infinity, Infinity, false);
        if (score > bestScore) {
          bestScore = score;
          bestCol = col;
        }
      }
      return bestCol;
    }

    function minimax(b, depth, alpha, beta, isMaximizing) {
      const aiWin = checkWinForBoard(b, 2);
      const humanWin = checkWinForBoard(b, 1);
      const isDrawBoard = checkDrawForBoard(b);

      if (aiWin) return 100000 + depth;
      if (humanWin) return -100000 - depth;
      if (isDrawBoard || depth === 0) return evaluateBoard(b);

      const validCols = getValidColsForBoard(b);
      if (validCols.length === 0) return 0;

      if (isMaximizing) {
        let maxEval = -Infinity;
        for (const col of validCols) {
          const row = getLowestRowForBoard(col, b);
          const newB = b.map(r => [...r]);
          newB[row][col] = 2;
          const evalScore = minimax(newB, depth - 1, alpha, beta, false);
          maxEval = Math.max(maxEval, evalScore);
          alpha = Math.max(alpha, evalScore);
          if (beta <= alpha) break;
        }
        return maxEval;
      } else {
        let minEval = Infinity;
        for (const col of validCols) {
          const row = getLowestRowForBoard(col, b);
          const newB = b.map(r => [...r]);
          newB[row][col] = 1;
          const evalScore = minimax(newB, depth - 1, alpha, beta, true);
          minEval = Math.min(minEval, evalScore);
          beta = Math.min(beta, evalScore);
          if (beta <= alpha) break;
        }
        return minEval;
      }
    }

    function evaluateBoard(b) {
      let score = 0;
      const centerCol = 3;
      let centerCount = 0;
      for (let r = 0; r < ROWS; r++) {
        if (b[r][centerCol] === 2) centerCount++;
        if (b[r][centerCol] === 1) centerCount--;
      }
      score += centerCount * 6;

      for (let r = 0; r < ROWS; r++) {
        for (let c = 0; c < COLS - 3; c++) {
          const window = [b[r][c], b[r][c+1], b[r][c+2], b[r][c+3]];
          score += evaluateWindow(window);
        }
      }
      for (let r = 0; r < ROWS - 3; r++) {
        for (let c = 0; c < COLS; c++) {
          const window = [b[r][c], b[r+1][c], b[r+2][c], b[r+3][c]];
          score += evaluateWindow(window);
        }
      }
      for (let r = 0; r < ROWS - 3; r++) {
        for (let c = 0; c < COLS - 3; c++) {
          const window = [b[r][c], b[r+1][c+1], b[r+2][c+2], b[r+3][c+3]];
          score += evaluateWindow(window);
        }
      }
      for (let r = 3; r < ROWS; r++) {
        for (let c = 0; c < COLS - 3; c++) {
          const window = [b[r][c], b[r-1][c+1], b[r-2][c+2], b[r-3][c+3]];
          score += evaluateWindow(window);
        }
      }
      return score;
    }

    function evaluateWindow(window) {
      const ai = window.filter(x => x === 2).length;
      const human = window.filter(x => x === 1).length;
      const empty = window.filter(x => x === 0).length;
      if (ai === 4) return 1000;
      if (human === 4) return -1000;
      if (ai === 3 && empty === 1) return 50;
      if (human === 3 && empty === 1) return -50;
      if (ai === 2 && empty === 2) return 10;
      if (human === 2 && empty === 2) return -10;
      return 0;
    }

    function getValidCols() {
      const cols = [];
      for (let c = 0; c < COLS; c++) {
        if (board[0][c] === 0) cols.push(c);
      }
      return cols;
    }

    function getValidColsForBoard(b) {
      const cols = [];
      for (let c = 0; c < COLS; c++) {
        if (b[0][c] === 0) cols.push(c);
      }
      return cols;
    }

    function getLowestRowForBoard(col, b) {
      for (let r = ROWS - 1; r >= 0; r--) {
        if (b[r][col] === 0) return r;
      }
      return -1;
    }

    function checkWinForBoard(b, player) {
      for (let r = 0; r < ROWS; r++) {
        for (let c = 0; c < COLS; c++) {
          if (b[r][c] !== player) continue;
          if (c <= COLS - 4 && b[r][c+1] === player && b[r][c+2] === player && b[r][c+3] === player) return true;
          if (r <= ROWS - 4 && b[r+1][c] === player && b[r+2][c] === player && b[r+3][c] === player) return true;
          if (r <= ROWS - 4 && c <= COLS - 4 && b[r+1][c+1] === player && b[r+2][c+2] === player && b[r+3][c+3] === player) return true;
          if (r >= 3 && c <= COLS - 4 && b[r-1][c+1] === player && b[r-2][c+2] === player && b[r-3][c+3] === player) return true;
        }
      }
      return false;
    }

    function checkDrawForBoard(b) {
      return b[0].every(c => c !== 0);
    }

    function playAgain() {
      document.getElementById('gameover-overlay').classList.remove('active');
      if (isAI) {
        initBoard();
        currentTurn = 1;
        gameActive = true;
        updateTurn();
        updatePlayerLabels();
      } else {
        restartRequested = true;
        send({ type: 'restart' });
        if (opponentRestartRequested) {
          performRestart();
        } else {
          document.getElementById('turn-text').textContent = 'Waiting for opponent...';
          document.getElementById('turn-dot').style.opacity = '0.3';
        }
      }
    }

    function performRestart() {
      initBoard();
      currentTurn = 1;
      gameActive = true;
      restartRequested = false;
      opponentRestartRequested = false;
      clearChat();
      updateTurn();
      updatePlayerLabels();
      document.getElementById('turn-dot').style.opacity = '1';
      if (!isAI) send({ type: 'start', host: true });
    }

    function leaveGame() {
      if (!isAI) send({ type: 'leave' });
      cleanup();
      showLandingScreen();
    }

    function leaveRoom() {
      cleanup();
      showLandingScreen();
    }

    function cleanup() {
      hideChatPanel();
      document.getElementById('chat-toggle-btn').style.display = 'none';
      if (connectRetryTimer) {
        clearTimeout(connectRetryTimer);
        connectRetryTimer = null;
        connectRetryCount = 0;
      }
      if (aiThinkingTimer) {
        clearTimeout(aiThinkingTimer);
        aiThinkingTimer = null;
      }
      isAI = false;
      if (connection) {
        connection.close();
        connection = null;
      }
      if (peer) {
        peer.destroy();
        peer = null;
      }
      gameActive = false;
      document.getElementById('gameover-overlay').classList.remove('active');
      document.getElementById('disconnect-overlay').classList.remove('active');
      document.getElementById('player1-info').classList.remove('you');
      document.getElementById('player2-info').classList.remove('you');
      document.getElementById('turn-dot').style.opacity = '1';
    }

    function resetAll() {
      cleanup();
      showLandingScreen();
    }

    function copyRoomId() {
      const id = document.getElementById('room-id-display').textContent;
      navigator.clipboard.writeText(id).then(() => {
        document.getElementById('copy-text').textContent = 'Copied!';
        setTimeout(() => {
          document.getElementById('copy-text').textContent = 'Copy ID';
        }, 2000);
      }).catch(() => {
        const input = document.createElement('input');
        input.value = id;
        document.body.appendChild(input);
        input.select();
        document.execCommand('copy');
        document.body.removeChild(input);
        document.getElementById('copy-text').textContent = 'Copied!';
        setTimeout(() => {
          document.getElementById('copy-text').textContent = 'Copy ID';
        }, 2000);
      });
    }

    window.addEventListener('beforeunload', () => {
      if (connection) send({ type: 'leave' });
    });
  </script>
</body>
</html>
